name: Cleanup deleted media

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:
    inputs:
      retention_days:
        description: Days to keep soft-deleted artwork before permanent cleanup
        required: true
        default: 30
        type: number

permissions:
  contents: write

concurrency:
  group: ingest-artwork
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install --requirement requirements.txt
      - name: Delete expired R2 objects and metadata
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          RETENTION_DAYS: ${{ inputs.retention_days || 30 }}
        run: python scripts/cleanup_deleted.py --retention-days "$RETENTION_DAYS"
      - name: Commit permanent cleanup
        run: |
          if git diff --quiet -- src/content/artworks; then
            echo "No expired metadata to remove"
            exit 0
          fi
          git config user.name "sesese-se bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/content/artworks
          git commit -m "content: clean expired deleted media"
          git push
